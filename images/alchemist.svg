<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c0a00"/>
      <stop offset="50%" stop-color="#7a3500"/>
      <stop offset="100%" stop-color="#c46a00"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="30%" r="40%">
      <stop offset="0%" stop-color="#ffd700" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
  <rect width="200" height="300" fill="url(#g)"/>
  <rect fill="url(#sun)" width="200" height="300"/>
  <rect x="8" y="8" width="184" height="284" fill="none" stroke="rgba(255,200,50,0.3)" stroke-width="1"/>
  <!-- Sun rays -->
  <g opacity="0.4">
    <line x1="100" y1="20" x2="100" y2="5" stroke="#ffd700" stroke-width="1.5"/>
    <line x1="130" y1="28" x2="140" y2="16" stroke="#ffd700" stroke-width="1.5"/>
    <line x1="152" y1="48" x2="165" y2="40" stroke="#ffd700" stroke-width="1.5"/>
    <line x1="70" y1="28" x2="60" y2="16" stroke="#ffd700" stroke-width="1.5"/>
    <line x1="48" y1="48" x2="35" y2="40" stroke="#ffd700" stroke-width="1.5"/>
  </g>
  <!-- Sun circle -->
  <circle cx="100" cy="65" r="28" fill="none" stroke="#ffd700" stroke-width="1.5" opacity="0.6"/>
  <circle cx="100" cy="65" r="20" fill="rgba(255,200,50,0.2)" stroke="#ffd700" stroke-width="1" opacity="0.8"/>
  <circle cx="100" cy="65" r="10" fill="rgba(255,200,50,0.4)"/>
  <!-- Desert dunes -->
  <path d="M0 160 Q50 135 100 155 Q150 175 200 150 L200 300 L0 300Z" fill="rgba(150,80,0,0.5)"/>
  <path d="M0 175 Q60 158 120 170 Q160 178 200 165 L200 300 L0 300Z" fill="rgba(120,60,0,0.4)"/>
  <!-- Pyramid -->
  <polygon points="100,115 65,158 135,158" fill="rgba(200,120,20,0.6)" stroke="rgba(255,200,50,0.4)" stroke-width="0.75"/>
  <!-- Title area -->
  <rect x="0" y="190" width="200" height="110" fill="rgba(0,0,0,0.55)"/>
  <line x1="20" y1="198" x2="180" y2="198" stroke="rgba(255,180,0,0.5)" stroke-width="0.75"/>
  <text x="100" y="222" text-anchor="middle" fill="#ffd700" font-family="Georgia, serif" font-size="15" font-weight="bold" letter-spacing="0.5">The</text>
  <text x="100" y="243" text-anchor="middle" fill="#ffd700" font-family="Georgia, serif" font-size="15" font-weight="bold" letter-spacing="0.5">Alchemist</text>
  <line x1="50" y1="254" x2="150" y2="254" stroke="rgba(255,180,0,0.4)" stroke-width="0.75"/>
  <text x="100" y="270" text-anchor="middle" fill="rgba(255,220,150,0.7)" font-family="Georgia, serif" font-size="10">Paulo Coelho</text>
  <text x="100" y="286" text-anchor="middle" fill="rgba(255,180,0,0.35)" font-family="Georgia, serif" font-size="8" letter-spacing="1.5">A FABLE</text>
</svg>
