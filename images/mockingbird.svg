  <line x1="100" y1="168" x2="130" y2="142" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <line x1="100" y1="180" x2="62" y2="165" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <line x1="100" y1="178" x2="138" y2="163" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <!-- Moon -->
  <circle cx="100" cy="85" r="32" fill="rgba(255,255,180,0.12)"/>
  <circle cx="100" cy="85" r="26" fill="rgba(255,255,180,0.1)"/>
  <!-- Bird silhouette -->
  <path d="M88 78 Q100 65 112 78 Q104 80 100 82 Q96 80 88 78Z" fill="rgba(255,255,255,0.6)"/>
  <path d="M100 82 L96 90 L100 88 L104 90 Z" fill="rgba(255,255,255,0.6)"/>
