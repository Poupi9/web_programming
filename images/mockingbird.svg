  <circle cx="168" cy="65" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="32" cy="70" r="1" fill="white" opacity="0.5"/>
  <circle cx="140" cy="110" r="1" fill="white" opacity="0.4"/>
  <!-- Title area -->
  <rect x="0" y="195" width="200" height="105" fill="rgba(0,0,0,0.45)"/>
  <text x="100" y="217" text-anchor="middle" fill="white" font-family="Georgia, serif" font-size="13" font-weight="bold">To Kill a</text>
  <text x="100" y="236" text-anchor="middle" fill="white" font-family="Georgia, serif" font-size="13" font-weight="bold">Mockingbird</text>
  <line x1="50" y1="247" x2="150" y2="247" stroke="rgba(255,255,255,0.3)" stroke-width="0.75"/>
  <text x="100" y="262" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-family="Georgia, serif" font-size="10">Harper Lee</text>
  <text x="100" y="282" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-family="Georgia, serif" font-size="8" letter-spacing="2">PULITZER PRIZE</text>
