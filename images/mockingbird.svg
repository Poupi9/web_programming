<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a4a6b"/>
      <stop offset="100%" stop-color="#0d2d45"/>
    </linearGradient>
  </defs>
  <rect width="200" height="300" fill="url(#g)"/>
  <rect x="8" y="8" width="184" height="284" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
