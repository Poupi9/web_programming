<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#1a3a5c"/>
    </linearGradient>
  </defs>
  <rect width="200" height="300" fill="url(#g)"/>
  <rect x="8" y="8" width="184" height="284" fill="none" stroke="#c9a84c" stroke-width="1.5"/>
  <rect x="14" y="14" width="172" height="272" fill="none" stroke="rgba(201,168,76,0.4)" stroke-width="0.5"/>
  <!-- Art Deco circles -->
  <circle cx="100" cy="105" r="55" fill="none" stroke="#c9a84c" stroke-width="1"/>
  <circle cx="100" cy="105" r="42" fill="none" stroke="rgba(201,168,76,0.5)" stroke-width="0.5"/>
  <circle cx="100" cy="105" r="30" fill="none" stroke="#c9a84c" stroke-width="1"/>
  <!-- Eye in the circle -->
  <ellipse cx="100" cy="105" rx="20" ry="10" fill="#c9a84c" opacity="0.3"/>
  <circle cx="100" cy="105" r="6" fill="#c9a84c"/>
  <!-- Radiating lines -->
  <line x1="100" y1="50" x2="100" y2="35" stroke="#c9a84c" stroke-width="1"/>
  <line x1="145" y1="70" x2="157" y2="60" stroke="#c9a84c" stroke-width="1"/>
  <line x1="155" y1="105" x2="170" y2="105" stroke="#c9a84c" stroke-width="1"/>
  <line x1="55" y1="70" x2="43" y2="60" stroke="#c9a84c" stroke-width="1"/>
  <line x1="45" y1="105" x2="30" y2="105" stroke="#c9a84c" stroke-width="1"/>
  <!-- Title area -->
  <rect x="0" y="185" width="200" height="115" fill="rgba(0,0,0,0.5)"/>
  <line x1="30" y1="192" x2="170" y2="192" stroke="#c9a84c" stroke-width="0.75"/>
  <text x="100" y="214" text-anchor="middle" fill="#c9a84c" font-family="Georgia, serif" font-size="16" font-weight="bold" letter-spacing="1">The Great</text>
  <text x="100" y="234" text-anchor="middle" fill="#c9a84c" font-family="Georgia, serif" font-size="16" font-weight="bold" letter-spacing="1">Gatsby</text>
  <line x1="50" y1="244" x2="150" y2="244" stroke="rgba(201,168,76,0.5)" stroke-width="0.75"/>
  <text x="100" y="260" text-anchor="middle" fill="rgba(255,255,255,0.65)" font-family="Georgia, serif" font-size="10" letter-spacing="0.5">F. Scott Fitzgerald</text>
  <line x1="30" y1="278" x2="170" y2="278" stroke="#c9a84c" stroke-width="0.75"/>
</svg>
